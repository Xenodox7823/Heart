<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Balloon Heart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Camera Reset Button -->
    <button id="reset-camera">Reset Camera</button>

    <!-- 1. Load Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 2. Load OrbitControls for camera movement -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- 3. Load MeshSurfaceSampler to evenly distribute particles on the balloon's surface -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/math/MeshSurfaceSampler.js"></script>
    <script src="script.js"></script>
</body>
</html>
